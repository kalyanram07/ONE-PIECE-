<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="1200" fill="none" />
  <text x="400" y="600" font-family="'Cinzel', serif" font-size="80" font-weight="bold" fill="#0984e3" text-anchor="middle" filter="url(#glow)">JINBE</text>
  <text x="400" y="680" font-family="'Inter', sans-serif" font-size="30" fill="#ddd" text-anchor="middle">"KNIGHT OF THE SEA"</text>
</svg>
